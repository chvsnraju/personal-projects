<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Vibrant indigo to violet gradient matching ToolShed branding -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>
  
  <!-- Background Rounded Square (Squircle style) -->
  <rect width="512" height="512" rx="144" fill="url(#grad)" />
  
  <!-- Stylized Shed + Tool + AI Spark Motif -->
  <g filter="url(#shadow)">
    <!-- Shed Outline (Structure & Storage) -->
    <path d="M256 95 L415 208 L415 385 C415 398.8 403.8 410 290 410 L222 410 C108.2 410 97 398.8 97 385 L97 208 Z" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="26" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
    
    <!-- Central Wrench Silhouette (Tools & Maintenance) -->
    <!-- Wrench shaft -->
    <path d="M256 220 L256 355" stroke="#ffffff" stroke-width="22" stroke-linecap="round" />
    <!-- Wrench head circle -->
    <path d="M226 210 C226 193.4 239.4 180 256 180 C272.6 180 286 193.4 286 210 C286 223.5 277 235 264 239 L264 240 M248 240 L248 239 C235 235 226 223.5 226 210 Z" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="22" 
          stroke-linejoin="round" />
    <!-- Wrench head cutout -->
    <path d="M244 180 L244 205 L268 205 L268 180" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Sparkles (Intelligence / Smart AI Assist) -->
    <path d="M352 170 L356 150 L372 146 L356 142 L352 122 L348 142 L332 146 L348 150 Z" fill="#ffffff" />
    <path d="M386 130 L388 118 L398 115.5 L388 113 L386 101 L384 113 L374 115.5 L384 118 Z" fill="#ffffff" opacity="0.8" />
  </g>
</svg>
