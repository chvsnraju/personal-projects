<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="sun-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <circle cx="16" cy="16" r="7" fill="url(#sun-gradient)" filter="url(#glow)" />
  
  <g stroke="url(#sun-gradient)" stroke-width="2" stroke-linecap="round">
    <!-- N -->
    <line x1="16" y1="5" x2="16" y2="2" />
    <!-- S -->
    <line x1="16" y1="27" x2="16" y2="30" />
    <!-- E -->
    <line x1="27" y1="16" x2="30" y2="16" />
    <!-- W -->
    <line x1="5" y1="16" x2="2" y2="16" />
    
    <!-- NE -->
    <line x1="23.78" y1="8.22" x2="25.9" y2="6.1" />
    <!-- SW -->
    <line x1="8.22" y1="23.78" x2="6.1" y2="25.9" />
    <!-- SE -->
    <line x1="23.78" y1="23.78" x2="25.9" y2="25.9" />
    <!-- NW -->
    <line x1="8.22" y1="8.22" x2="6.1" y2="6.1" />
  </g>
</svg>