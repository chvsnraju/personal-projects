steps:
  # 1. Install dependencies using Node 20
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']
    dir: 'cloud-java/frontend'

  # 2. Build production React app using Node 20
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    dir: 'cloud-java/frontend'
    env:
      - 'VITE_API_BASE_URL=${_VITE_API_BASE_URL}'

  # 3. Synchronize static files to GCP Storage Bucket
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gsutil'
    args: ['-m', 'rsync', '-r', '-c', '-d', 'cloud-java/frontend/dist', 'gs://${_GCS_BUCKET_NAME}']

  # 4. Set Cache-Control on index.html so it is never cached by CDNs/browsers
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gsutil'
    args: ['setmeta', '-h', 'Cache-Control:no-store, no-cache, must-revalidate', 'gs://${_GCS_BUCKET_NAME}/index.html']

options:
  logging: CLOUD_LOGGING_ONLY
